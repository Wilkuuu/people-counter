name: Build Windows EXE

on:
  push:
    branches:
      - windows
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cu124 torch torchvision torchaudio
          pip install -r requirements.txt

      - name: Verify torch CUDA build
        run: |
          python -c "import torch,sys; print('torch', torch.__version__); print('compiled_cuda', torch.version.cuda); print('cuda_available', torch.cuda.is_available()); print('device_count', torch.cuda.device_count()); sys.exit(0 if torch.version.cuda else 1)"

      - name: Build onefile EXE
        run: |
          pyinstaller people_counter.spec --clean

      - name: Verify smoke test script version
        run: |
          git rev-parse HEAD
          python -c "from pathlib import Path; s=Path('scripts/smoke_test_artifact.ps1').read_text(encoding='utf-8'); bad=('HttpClientHandler' in s) or ('System.Net.Http' in s); print('smoke_script_v3', 'v3-curl-upload-final-status' in s); print('legacy_httpclient_code_present', bad); import sys; sys.exit(1 if bad else 0)"

      - name: Upload EXE artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: people-counter-windows-exe
          path: dist/people-counter.exe
          if-no-files-found: error
